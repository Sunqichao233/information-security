<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>题库 | 情报安全考试学习站</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="questions">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" data-i18n="siteName">情报安全考试学习站</a>
        <nav class="nav">
          <a href="./index.html" data-nav="home" data-i18n="navHome">首页</a>
          <a href="./questions.html" data-nav="questions" data-i18n="navQuestions">题库</a>
          <a href="./knowledge.html" data-nav="knowledge" data-i18n="navKnowledge">知识点</a>
        </nav>
        <div class="lang-switch">
          <button type="button" data-lang="zh">中</button>
          <button type="button" data-lang="ja">日</button>
        </div>
      </div>
    </header>

    <main class="container main">
      <section class="hero compact">
        <h1 data-i18n="questionsTitle">题库练习</h1>
        <p data-i18n="questionsIntro">按主题筛选和检索，题目支持中日双语与假名选项。</p>
      </section>

      <section class="question-toolbar">
        <label>
          <span data-i18n="searchLabel">搜索</span>
          <input id="question-search" type="search" data-i18n-placeholder="searchPlaceholder" placeholder="输入关键词" />
        </label>
        <label>
          <span data-i18n="tagLabel">标签</span>
          <select id="question-tag">
            <option value="all" data-i18n="tagAll">全部</option>
            <option value="basic" data-i18n="tagBasic">基础</option>
            <option value="crypto" data-i18n="tagCrypto">加密</option>
            <option value="incident" data-i18n="tagIncident">应急响应</option>
            <option value="secure-dev" data-i18n="tagSecureDev">安全开发</option>
          </select>
        </label>
        <p id="question-count" class="question-count"></p>
      </section>

      <section id="question-list" class="list"></section>

      <section class="pager">
        <button id="page-prev" type="button" data-i18n="prevPage">上一页</button>
        <span id="question-page"></span>
        <button id="page-next" type="button" data-i18n="nextPage">下一页</button>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small data-i18n="footerText">仅用于学习交流，内容可持续补充。</small>
      </div>
    </footer>

    <script src="./assets/i18n.js"></script>
    <script src="./assets/questions-data.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
