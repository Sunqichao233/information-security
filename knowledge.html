<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>知识点 | 情报安全考试学习站</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body data-page="knowledge">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="./index.html" data-i18n="siteName">情报安全考试学习站</a>
        <nav class="nav">
          <a href="./index.html" data-nav="home" data-i18n="navHome">首页</a>
          <a href="./questions.html" data-nav="questions" data-i18n="navQuestions">题库</a>
          <a href="./knowledge.html" data-nav="knowledge" data-i18n="navKnowledge">知识点</a>
        </nav>
        <div class="lang-switch">
          <button type="button" data-lang="zh">中</button>
          <button type="button" data-lang="ja">日</button>
        </div>
      </div>
    </header>

    <main class="container main">
      <section class="hero compact">
        <h1 data-i18n="knowledgeTitle">知识点速记</h1>
        <p data-i18n="knowledgeIntro">按考试常见主题整理，适合临考前快速回顾。</p>
      </section>

      <section class="grid-3">
        <article class="card">
          <h2 data-i18n="k1Title">CIA 三要素</h2>
          <p data-i18n="k1Text">机密性、完整性、可用性是信息安全基本框架。</p>
        </article>
        <article class="card">
          <h2 data-i18n="k2Title">风险管理</h2>
          <p data-i18n="k2Text">通过识别、分析、评估和处置来降低风险影响。</p>
        </article>
        <article class="card">
          <h2 data-i18n="k3Title">加密基础</h2>
          <p data-i18n="k3Text">理解对称加密、非对称加密与哈希的使用场景。</p>
        </article>
        <article class="card">
          <h2 data-i18n="k4Title">访问控制</h2>
          <p data-i18n="k4Text">最小权限原则可减少越权操作和攻击面。</p>
        </article>
        <article class="card">
          <h2 data-i18n="k5Title">日志与监控</h2>
          <p data-i18n="k5Text">日志留存与告警联动是发现异常行为的关键。</p>
        </article>
        <article class="card">
          <h2 data-i18n="k6Title">应急响应</h2>
          <p data-i18n="k6Text">准备、检测、抑制、恢复、复盘构成完整闭环。</p>
        </article>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <small data-i18n="footerText">仅用于学习交流，内容可持续补充。</small>
      </div>
    </footer>

    <script src="./assets/i18n.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
