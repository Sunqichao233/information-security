<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">秘匿化与匿名化示意图</title>
  <desc id="desc">对比秘匿化和匿名化的目标与处理方式</desc>
  <defs>
    <style>
      .h1 { font: 700 54px "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111; }
      .h2 { font: 700 34px "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111; }
      .t  { font: 600 24px "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111; }
      .s  { font: 500 20px "Noto Sans CJK SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #111; }
      .panel { fill: #fff; stroke: #d9d9d9; stroke-width: 1; }
      .card { fill: #f7df95; stroke: #2f2f2f; stroke-width: 3; rx: 14; }
      .vault { fill: #d8e6f2; stroke: #202124; stroke-width: 4; rx: 16; }
      .arrowBlue { stroke: #4c95d9; stroke-width: 12; fill: none; marker-end: url(#arrowBlue); }
      .arrowRed { stroke: #d95858; stroke-width: 12; fill: none; marker-end: url(#arrowRed); }
    </style>
    <marker id="arrowBlue" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 z" fill="#4c95d9"/>
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 z" fill="#d95858"/>
    </marker>
  </defs>

  <rect width="1600" height="120" fill="#bfe5ff"/>
  <text x="60" y="80" class="h1">秘匿化与匿名化（Confidentiality vs. Anonymity）</text>

  <rect x="0" y="120" width="1600" height="620" class="panel"/>
  <line x1="800" y1="150" x2="800" y2="710" stroke="#111" stroke-width="4"/>

  <text x="70" y="220" class="h2">秘匿化（Confidentiality）</text>
  <rect x="90" y="350" width="130" height="180" class="card"/>
  <text x="115" y="430" class="t">机密</text>
  <text x="115" y="470" class="t">数据</text>

  <rect x="300" y="350" width="180" height="170" class="vault"/>
  <circle cx="390" cy="435" r="34" fill="none" stroke="#111" stroke-width="5"/>
  <circle cx="390" cy="435" r="8" fill="#111"/>
  <rect x="455" y="470" width="56" height="64" rx="10" fill="#f6ca61" stroke="#202124" stroke-width="4"/>
  <path d="M472 470 v-14 a11 11 0 0 1 22 0 v14" fill="none" stroke="#202124" stroke-width="4"/>

  <rect x="580" y="350" width="180" height="170" class="vault"/>
  <circle cx="670" cy="435" r="34" fill="none" stroke="#111" stroke-width="5"/>
  <circle cx="670" cy="435" r="8" fill="#111"/>
  <rect x="735" y="470" width="56" height="64" rx="10" fill="#f6ca61" stroke="#202124" stroke-width="4"/>
  <path d="M752 470 v-14 a11 11 0 0 1 22 0 v14" fill="none" stroke="#202124" stroke-width="4"/>

  <path d="M220 440 H285" class="arrowBlue"/>
  <path d="M485 440 H565" class="arrowRed"/>

  <text x="60" y="590" class="h2">机密数据</text>
  <text x="310" y="590" class="h2">加密 / 访问控制</text>
  <text x="550" y="590" class="h2">隐藏数据本身</text>

  <text x="900" y="220" class="h2">匿名化（Anonymity）</text>

  <circle cx="930" cy="410" r="55" fill="#ffd8c2" stroke="#202124" stroke-width="4"/>
  <path d="M875 515 q55-38 110 0 v35 h-110z" fill="#4a7fd8" stroke="#202124" stroke-width="4"/>
  <text x="885" y="585" class="h2">个人A</text>

  <rect x="990" y="350" width="130" height="180" class="card"/>
  <text x="1010" y="425" class="t">姓名:</text>
  <text x="1010" y="460" class="t">山田太郎</text>
  <text x="1010" y="495" class="t">ID:12345</text>

  <path d="M1130 440 H1290" class="arrowBlue"/>
  <text x="1120" y="365" class="h2">加工 / 置换</text>

  <circle cx="1360" cy="410" r="55" fill="#ffd8c2" stroke="#202124" stroke-width="4"/>
  <rect x="1330" y="388" width="60" height="28" rx="6" fill="#fff" stroke="#9aa0a6" stroke-width="3"/>
  <path d="M1305 515 q55-38 110 0 v35 h-110z" fill="#4a7fd8" stroke="#202124" stroke-width="4"/>

  <rect x="1420" y="350" width="130" height="180" class="card"/>
  <text x="1438" y="425" class="t">姓名: ***</text>
  <text x="1438" y="460" class="t">ID: ***</text>
  <text x="1438" y="495" class="t">AABBCC</text>

  <text x="1315" y="585" class="h2">匿名者</text>
  <text x="1240" y="650" class="h2">无法识别具体个人</text>

  <text x="210" y="790" class="h2">秘匿化是让数据“看不见”，匿名化是让“身份不可识别”，两者目标与手法不同。</text>
</svg>
