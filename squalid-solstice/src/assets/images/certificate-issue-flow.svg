<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Digital Certificate Issuance Flow</title>
  <desc id="desc">A requests a certificate from CA, CA issues certificate, B verifies A's public key ownership.</desc>
  <rect width="1200" height="680" fill="#f7f8fb"/>

  <rect x="40" y="40" width="1120" height="600" rx="18" fill="#ffffff" stroke="#d8dce6"/>

  <rect x="90" y="260" width="230" height="160" rx="12" fill="#eaf4ff" stroke="#7eb2e6"/>
  <text x="205" y="315" text-anchor="middle" font-size="30" fill="#1f3f6b" font-family="Arial, sans-serif">A</text>
  <text x="205" y="355" text-anchor="middle" font-size="22" fill="#3b4b65" font-family="Arial, sans-serif">申请者</text>

  <rect x="485" y="210" width="230" height="200" rx="12" fill="#eefaf1" stroke="#83c89a"/>
  <text x="600" y="275" text-anchor="middle" font-size="30" fill="#1e5a2f" font-family="Arial, sans-serif">CA</text>
  <text x="600" y="315" text-anchor="middle" font-size="22" fill="#3b4b65" font-family="Arial, sans-serif">认证局</text>
  <text x="600" y="348" text-anchor="middle" font-size="18" fill="#5c6474" font-family="Arial, sans-serif">可信第三方</text>

  <rect x="880" y="260" width="230" height="160" rx="12" fill="#fff4ec" stroke="#e7ad80"/>
  <text x="995" y="315" text-anchor="middle" font-size="30" fill="#7a4017" font-family="Arial, sans-serif">B</text>
  <text x="995" y="355" text-anchor="middle" font-size="22" fill="#3b4b65" font-family="Arial, sans-serif">验证者</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#d64141"/>
    </marker>
  </defs>

  <line x1="320" y1="290" x2="485" y2="250" stroke="#d64141" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="402" y="240" text-anchor="middle" font-size="20" fill="#d64141" font-family="Arial, sans-serif">1. 申请证书</text>

  <line x1="715" y1="300" x2="880" y2="350" stroke="#d64141" stroke-width="8" marker-end="url(#arrow)"/>
  <text x="798" y="285" text-anchor="middle" font-size="20" fill="#d64141" font-family="Arial, sans-serif">2. 签发数字证书</text>

  <line x1="930" y1="430" x2="300" y2="430" stroke="#d64141" stroke-width="6" stroke-dasharray="12 12" marker-end="url(#arrow)"/>
  <text x="615" y="470" text-anchor="middle" font-size="20" fill="#d64141" font-family="Arial, sans-serif">3. B 基于证书确认 A 的公开键归属</text>

  <rect x="450" y="520" width="300" height="90" rx="10" fill="#f2f5ff" stroke="#a6b2d9"/>
  <text x="600" y="560" text-anchor="middle" font-size="21" fill="#36405d" font-family="Arial, sans-serif">证书作用：绑定身份 + 公开键</text>
  <text x="600" y="590" text-anchor="middle" font-size="18" fill="#5c6474" font-family="Arial, sans-serif">由 CA 签名，形成可验证信任</text>
</svg>
