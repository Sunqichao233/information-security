<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Difference Between Digital Signature and Digital Certificate</title>
  <desc id="desc">Flow showing signature verifies tampering and impersonation, certificate verifies public key ownership.</desc>
  <rect width="1200" height="760" fill="#f7f8fb"/>
  <rect x="40" y="40" width="1120" height="680" rx="18" fill="#ffffff" stroke="#d8dce6"/>

  <text x="600" y="98" text-anchor="middle" font-size="34" fill="#333a4d" font-family="Arial, sans-serif">数字签名与数字证书的关系</text>

  <rect x="80" y="145" width="500" height="530" rx="14" fill="#f8fbff" stroke="#a9c7e8"/>
  <text x="330" y="190" text-anchor="middle" font-size="26" fill="#1f3f6b" font-family="Arial, sans-serif">数字签名（完整性 + 防伪造）</text>
  <text x="120" y="245" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">1) A 对文档计算哈希（摘要）</text>
  <text x="120" y="285" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">2) A 用私钥加密摘要，得到签名</text>
  <text x="120" y="325" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">3) 发送：文档 + 签名</text>
  <text x="120" y="365" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">4) B 用 A 的公钥验证签名</text>
  <text x="120" y="405" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">5) B 对文档重新计算哈希并比较</text>

  <rect x="120" y="455" width="420" height="170" rx="10" fill="#eef5ff" stroke="#8cb1df"/>
  <text x="330" y="505" text-anchor="middle" font-size="22" fill="#27476f" font-family="Arial, sans-serif">验证结果</text>
  <text x="330" y="545" text-anchor="middle" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">一致：未篡改，且签名者持有私钥</text>
  <text x="330" y="580" text-anchor="middle" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">不一致：篡改或签名无效</text>

  <rect x="620" y="145" width="500" height="530" rx="14" fill="#fff9f3" stroke="#e9c9a7"/>
  <text x="870" y="190" text-anchor="middle" font-size="26" fill="#7a4017" font-family="Arial, sans-serif">数字证书（身份 + 公钥绑定）</text>
  <text x="660" y="245" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">1) CA 对 A 的身份进行审核</text>
  <text x="660" y="285" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">2) CA 签发含 A 公钥的证书</text>
  <text x="660" y="325" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">3) B 验证证书链与有效期</text>
  <text x="660" y="365" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">4) B 确认“该公钥确属 A”</text>
  <text x="660" y="405" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">5) 再用该公钥做签名验证</text>

  <rect x="660" y="455" width="420" height="170" rx="10" fill="#fff2e6" stroke="#e2b489"/>
  <text x="870" y="505" text-anchor="middle" font-size="22" fill="#7a4017" font-family="Arial, sans-serif">证书解决的问题</text>
  <text x="870" y="545" text-anchor="middle" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">公钥是谁的？（防冒充）</text>
  <text x="870" y="580" text-anchor="middle" font-size="20" fill="#3b4b65" font-family="Arial, sans-serif">签名是否可信？（信任来源）</text>

  <line x1="600" y1="140" x2="600" y2="675" stroke="#d8dce6" stroke-width="2"/>
</svg>
