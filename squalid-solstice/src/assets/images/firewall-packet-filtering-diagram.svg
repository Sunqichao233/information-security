<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Packet Filtering Firewall Diagram</title>
  <desc id="desc">Internet packets pass through a firewall with ACL rules and are either allowed or denied to the internal LAN.</desc>
  <rect width="1200" height="640" fill="#f7f9fc"/>
  <rect x="0" y="0" width="1200" height="78" fill="#dff0ff"/>
  <text x="600" y="50" text-anchor="middle" font-size="42" font-family="Arial, sans-serif" fill="#1c2b39" font-weight="700">
    パケットフィルタリング型ファイアウォールの仕組み
  </text>

  <defs>
    <marker id="arrBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4a9ad9"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#45b36b"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#d9534f"/>
    </marker>
  </defs>

  <g transform="translate(90,300)">
    <path d="M0,70 C0,20 45,10 70,35 C80,0 145,0 155,40 C188,35 210,58 210,85 C210,108 194,125 165,125 H45 C20,125 0,110 0,88 Z" fill="#d7e8f6" stroke="#9ebdd5" stroke-width="3"/>
  </g>
  <text x="170" y="500" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" fill="#1d2430">互联网</text>
  <text x="170" y="538" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#1d2430">（外部网络）</text>

  <rect x="895" y="305" width="250" height="4" fill="#242a34"/>
  <rect x="1020" y="236" width="4" height="145" fill="#242a34"/>
  <rect x="960" y="210" width="76" height="52" rx="6" fill="#d7ebff" stroke="#5887b1" stroke-width="3"/>
  <rect x="973" y="273" width="52" height="38" rx="5" fill="#d7ebff" stroke="#5887b1" stroke-width="3"/>
  <rect x="1085" y="205" width="84" height="92" rx="7" fill="#a8d5ff" stroke="#5887b1" stroke-width="3"/>
  <circle cx="1127" cy="274" r="5" fill="#1d2430"/>
  <rect x="933" y="360" width="72" height="50" rx="6" fill="#d7ebff" stroke="#5887b1" stroke-width="3"/>
  <rect x="1040" y="355" width="100" height="66" rx="7" fill="#a8d5ff" stroke="#5887b1" stroke-width="3"/>
  <line x1="1054" y1="372" x2="1126" y2="372" stroke="#5887b1" stroke-width="3"/>
  <line x1="1054" y1="387" x2="1126" y2="387" stroke="#5887b1" stroke-width="3"/>
  <text x="1020" y="500" text-anchor="middle" font-size="34" font-family="Arial, sans-serif" fill="#1d2430">内部网络</text>
  <text x="1020" y="538" text-anchor="middle" font-size="28" font-family="Arial, sans-serif" fill="#1d2430">（LAN）</text>

  <line x1="260" y1="318" x2="515" y2="318" stroke="#4a9ad9" stroke-width="14" marker-end="url(#arrBlue)"/>
  <line x1="675" y1="318" x2="885" y2="318" stroke="#45b36b" stroke-width="14" marker-end="url(#arrGreen)"/>
  <line x1="675" y1="356" x2="825" y2="356" stroke="#d9534f" stroke-width="14" marker-end="url(#arrRed)"/>

  <g fill="#fff" stroke="#2c3e50" stroke-width="2.5">
    <rect x="306" y="282" width="26" height="32"/><polyline points="306,292 319,292 332,304" fill="none"/>
    <rect x="352" y="282" width="26" height="32"/><polyline points="352,292 365,292 378,304" fill="none"/>
    <rect x="398" y="282" width="26" height="32"/><polyline points="398,292 411,292 424,304" fill="none"/>
    <rect x="444" y="282" width="26" height="32"/><polyline points="444,292 457,292 470,304" fill="none"/>
    <rect x="705" y="282" width="26" height="32" fill="#d7ffe3"/><polyline points="705,292 718,292 731,304" fill="none"/>
    <rect x="760" y="282" width="26" height="32" fill="#d7ffe3"/><polyline points="760,292 773,292 786,304" fill="none"/>
    <rect x="815" y="282" width="26" height="32" fill="#d7ffe3"/><polyline points="815,292 828,292 841,304" fill="none"/>
    <rect x="705" y="340" width="26" height="32" fill="#ffd7d7"/><polyline points="705,350 718,350 731,362" fill="none"/>
  </g>
  <text x="745" y="362" font-size="52" fill="#d9534f" font-family="Arial, sans-serif" font-weight="700">×</text>
  <text x="790" y="392" font-size="52" fill="#d9534f" font-family="Arial, sans-serif" font-weight="700">×</text>

  <g>
    <polygon points="520,238 620,202 710,248 610,284" fill="#7bb5df" stroke="#2f5e85" stroke-width="3"/>
    <polygon points="520,238 520,388 610,436 610,284" fill="#5f9bc8" stroke="#2f5e85" stroke-width="3"/>
    <polygon points="610,284 710,248 710,398 610,436" fill="#4f88b1" stroke="#2f5e85" stroke-width="3"/>
    <line x1="545" y1="247" x2="635" y2="283" stroke="#2f5e85" stroke-width="3"/>
    <line x1="575" y1="235" x2="665" y2="271" stroke="#2f5e85" stroke-width="3"/>
    <line x1="604" y1="223" x2="694" y2="259" stroke="#2f5e85" stroke-width="3"/>
    <line x1="520" y1="268" x2="610" y2="314" stroke="#2f5e85" stroke-width="3"/>
    <line x1="520" y1="299" x2="610" y2="345" stroke="#2f5e85" stroke-width="3"/>
    <line x1="520" y1="329" x2="610" y2="375" stroke="#2f5e85" stroke-width="3"/>
    <line x1="546" y1="402" x2="546" y2="249" stroke="#2f5e85" stroke-width="3"/>
    <line x1="574" y1="418" x2="574" y2="260" stroke="#2f5e85" stroke-width="3"/>
    <line x1="602" y1="434" x2="602" y2="272" stroke="#2f5e85" stroke-width="3"/>
  </g>

  <g transform="translate(515,112)">
    <rect x="0" y="0" width="430" height="125" fill="#fff" stroke="#202833" stroke-width="3"/>
    <rect x="0" y="0" width="430" height="38" fill="#8dd0ff" stroke="#202833" stroke-width="3"/>
    <text x="215" y="27" text-anchor="middle" font-size="23" font-family="Arial, sans-serif" fill="#152332" font-weight="700">过滤规则（ACL 示例）</text>
    <line x1="0" y1="81" x2="430" y2="81" stroke="#202833" stroke-width="2.5"/>
    <text x="20" y="65" font-size="19" font-family="Arial, sans-serif" fill="#1b2430">源IP: A, 目标端口: 80</text>
    <text x="260" y="65" font-size="19" font-family="Arial, sans-serif" fill="#35a25f" font-weight="700">-> 允许 (Allow) ✓</text>
    <text x="20" y="109" font-size="19" font-family="Arial, sans-serif" fill="#1b2430">源IP: B, 目标端口: Any</text>
    <text x="260" y="109" font-size="19" font-family="Arial, sans-serif" fill="#cf4a4a" font-weight="700">-> 拒绝 (Deny) ✕</text>
    <polygon points="200,125 230,125 215,158" fill="#fff" stroke="#202833" stroke-width="3"/>
  </g>

  <text x="615" y="500" text-anchor="middle" font-size="37" font-family="Arial, sans-serif" fill="#1d2430">防火墙</text>
  <text x="615" y="538" text-anchor="middle" font-size="30" font-family="Arial, sans-serif" fill="#1d2430">（包过滤）</text>
</svg>
