<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Public key encryption diagram">
  <rect width="1200" height="560" fill="#f8fbff"/>

  <text x="110" y="70" font-size="56" fill="#4b5563" font-family="sans-serif">公開鍵暗号方式</text>
  <text x="40" y="125" font-size="28" fill="#111827" font-family="sans-serif">暗号化と復号で異なる鍵を使う方式（公開鍵で暗号化、秘密鍵で復号）</text>

  <text x="220" y="190" font-size="40" fill="#111827" font-family="sans-serif">送信者</text>
  <text x="820" y="190" font-size="40" fill="#111827" font-family="sans-serif">受信者</text>

  <circle cx="260" cy="240" r="24" fill="none" stroke="#111827" stroke-width="4"/>
  <rect x="220" y="266" width="80" height="92" rx="35" fill="none" stroke="#111827" stroke-width="4"/>
  <line x1="238" y1="300" x2="238" y2="340" stroke="#111827" stroke-width="4"/>
  <line x1="282" y1="300" x2="282" y2="340" stroke="#111827" stroke-width="4"/>

  <circle cx="860" cy="240" r="24" fill="none" stroke="#2c6da4" stroke-width="4"/>
  <rect x="820" y="266" width="80" height="92" rx="35" fill="none" stroke="#2c6da4" stroke-width="4"/>
  <line x1="838" y1="300" x2="838" y2="340" stroke="#2c6da4" stroke-width="4"/>
  <line x1="882" y1="300" x2="882" y2="340" stroke="#2c6da4" stroke-width="4"/>

  <rect x="95" y="365" width="140" height="66" fill="#ffffff" stroke="#111827" stroke-width="4"/>
  <text x="165" y="410" text-anchor="middle" font-size="42" fill="#111827" font-family="sans-serif">平文</text>

  <rect x="330" y="365" width="140" height="66" fill="#d9e8ff" stroke="#111827" stroke-width="4"/>
  <text x="400" y="410" text-anchor="middle" font-size="42" fill="#111827" font-family="sans-serif">暗号文</text>

  <rect x="730" y="365" width="140" height="66" fill="#d9e8ff" stroke="#111827" stroke-width="4"/>
  <text x="800" y="410" text-anchor="middle" font-size="42" fill="#111827" font-family="sans-serif">暗号文</text>

  <rect x="965" y="365" width="140" height="66" fill="#ffffff" stroke="#111827" stroke-width="4"/>
  <text x="1035" y="410" text-anchor="middle" font-size="42" fill="#111827" font-family="sans-serif">平文</text>

  <line x1="235" y1="398" x2="328" y2="398" stroke="#9ca3af" stroke-width="7"/>
  <polygon points="328,382 356,398 328,414" fill="#9ca3af"/>

  <line x1="470" y1="398" x2="730" y2="398" stroke="#9ca3af" stroke-width="5" stroke-dasharray="14 10"/>
  <text x="600" y="445" text-anchor="middle" font-size="42" fill="#4b5563" font-family="sans-serif">送信</text>

  <line x1="870" y1="398" x2="963" y2="398" stroke="#9ca3af" stroke-width="7"/>
  <polygon points="963,382 991,398 963,414" fill="#9ca3af"/>

  <g transform="translate(210,430) rotate(-20)">
    <rect x="0" y="0" width="56" height="24" rx="3" fill="#4f8fc6"/>
    <circle cx="40" cy="12" r="4" fill="#dbeafe"/>
    <rect x="10" y="24" width="16" height="76" fill="#4f8fc6"/>
    <polygon points="10,100 26,100 22,126 14,126" fill="#4f8fc6"/>
  </g>
  <text x="190" y="510" font-size="26" fill="#111827" font-family="sans-serif">受信者公開鍵で暗号化</text>

  <g transform="translate(810,430) rotate(-20)">
    <rect x="0" y="0" width="56" height="24" rx="3" fill="#4f8fc6"/>
    <circle cx="40" cy="12" r="4" fill="#dbeafe"/>
    <rect x="10" y="24" width="16" height="76" fill="#4f8fc6"/>
    <polygon points="10,100 26,100 22,126 14,126" fill="#4f8fc6"/>
  </g>
  <text x="790" y="510" font-size="26" fill="#111827" font-family="sans-serif">受信者秘密鍵で復号</text>

  <line x1="350" y1="518" x2="760" y2="518" stroke="#9ca3af" stroke-width="6"/>
  <polygon points="350,506 320,518 350,530" fill="#9ca3af"/>
  <polygon points="760,506 790,518 760,530" fill="#9ca3af"/>
  <text x="555" y="548" text-anchor="middle" font-size="38" fill="#4b5563" font-family="sans-serif">異なる鍵</text>
</svg>
