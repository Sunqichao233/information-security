<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="Key count comparison">
  <rect width="1200" height="620" fill="#f8fbff"/>

  <text x="80" y="80" font-size="56" fill="#4b5563" font-family="sans-serif">必要な鍵の本数</text>
  <text x="80" y="140" font-size="34" fill="#111827" font-family="sans-serif">n人が相互通信する場合</text>

  <rect x="80" y="180" width="500" height="160" rx="12" fill="#ffffff" stroke="#c9d3df" stroke-width="3"/>
  <text x="110" y="235" font-size="34" fill="#111827" font-family="sans-serif">共通鍵暗号方式</text>
  <text x="110" y="295" font-size="58" fill="#dc2626" font-family="sans-serif">n(n-1)/2 本</text>

  <rect x="620" y="180" width="500" height="160" rx="12" fill="#ffffff" stroke="#c9d3df" stroke-width="3"/>
  <text x="650" y="235" font-size="34" fill="#111827" font-family="sans-serif">公開鍵暗号方式</text>
  <text x="650" y="295" font-size="58" fill="#dc2626" font-family="sans-serif">2n 本</text>

  <rect x="80" y="380" width="1040" height="180" rx="12" fill="#ffffff" stroke="#c9d3df" stroke-width="3"/>
  <text x="110" y="445" font-size="42" fill="#111827" font-family="sans-serif">例：n=10 の場合</text>
  <text x="110" y="505" font-size="40" fill="#111827" font-family="sans-serif">共通鍵暗号方式：45本</text>
  <text x="650" y="505" font-size="40" fill="#111827" font-family="sans-serif">公開鍵暗号方式：20本</text>
</svg>
