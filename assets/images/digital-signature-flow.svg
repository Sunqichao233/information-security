<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Digital signature flow">
  <rect width="1200" height="700" fill="#f8fbff"/>

  <text x="70" y="70" font-size="44" fill="#111827" font-family="sans-serif">送信者が鍵ペアを用意し、秘密鍵で署名データを作成</text>
  <text x="70" y="120" font-size="44" fill="#111827" font-family="sans-serif">受信側は対応する公開鍵で検証する</text>

  <text x="240" y="190" font-size="40" fill="#111827" font-family="sans-serif">送信者</text>
  <text x="780" y="190" font-size="40" fill="#2c6da4" font-family="sans-serif">受信者</text>

  <circle cx="270" cy="240" r="22" fill="none" stroke="#111827" stroke-width="4"/>
  <rect x="232" y="264" width="76" height="88" rx="34" fill="none" stroke="#111827" stroke-width="4"/>
  <line x1="250" y1="296" x2="250" y2="334" stroke="#111827" stroke-width="4"/>
  <line x1="292" y1="296" x2="292" y2="334" stroke="#111827" stroke-width="4"/>

  <circle cx="810" cy="240" r="22" fill="none" stroke="#2c6da4" stroke-width="4"/>
  <rect x="772" y="264" width="76" height="88" rx="34" fill="none" stroke="#2c6da4" stroke-width="4"/>
  <line x1="790" y1="296" x2="790" y2="334" stroke="#2c6da4" stroke-width="4"/>
  <line x1="832" y1="296" x2="832" y2="334" stroke="#2c6da4" stroke-width="4"/>

  <rect x="120" y="380" width="130" height="62" fill="#ffffff" stroke="#111827" stroke-width="4"/>
  <text x="185" y="422" text-anchor="middle" font-size="40" fill="#111827" font-family="sans-serif">平文</text>
  <rect x="330" y="380" width="170" height="62" fill="#d9e8ff" stroke="#111827" stroke-width="4"/>
  <text x="415" y="422" text-anchor="middle" font-size="34" fill="#111827" font-family="sans-serif">署名付きデータ</text>
  <rect x="720" y="380" width="170" height="62" fill="#d9e8ff" stroke="#111827" stroke-width="4"/>
  <text x="805" y="422" text-anchor="middle" font-size="34" fill="#111827" font-family="sans-serif">署名付きデータ</text>
  <rect x="970" y="380" width="130" height="62" fill="#ffffff" stroke="#111827" stroke-width="4"/>
  <text x="1035" y="422" text-anchor="middle" font-size="40" fill="#111827" font-family="sans-serif">検証OK</text>

  <line x1="250" y1="411" x2="326" y2="411" stroke="#9ca3af" stroke-width="7"/>
  <polygon points="326,396 352,411 326,426" fill="#9ca3af"/>
  <line x1="500" y1="411" x2="720" y2="411" stroke="#9ca3af" stroke-width="5" stroke-dasharray="14 10"/>
  <text x="610" y="454" text-anchor="middle" font-size="38" fill="#4b5563" font-family="sans-serif">送信</text>
  <line x1="890" y1="411" x2="966" y2="411" stroke="#9ca3af" stroke-width="7"/>
  <polygon points="966,396 992,411 966,426" fill="#9ca3af"/>

  <g transform="translate(280,452) rotate(-20)">
    <rect x="0" y="0" width="56" height="24" rx="3" fill="#4f8fc6"/>
    <circle cx="40" cy="12" r="4" fill="#dbeafe"/>
    <rect x="10" y="24" width="16" height="76" fill="#4f8fc6"/>
    <polygon points="10,100 26,100 22,126 14,126" fill="#4f8fc6"/>
  </g>
  <text x="280" y="620" font-size="28" fill="#111827" font-family="sans-serif">送信者秘密鍵で署名</text>

  <g transform="translate(820,452) rotate(-20)">
    <rect x="0" y="0" width="56" height="24" rx="3" fill="#4f8fc6"/>
    <circle cx="40" cy="12" r="4" fill="#dbeafe"/>
    <rect x="10" y="24" width="16" height="76" fill="#4f8fc6"/>
    <polygon points="10,100 26,100 22,126 14,126" fill="#4f8fc6"/>
  </g>
  <text x="810" y="620" font-size="28" fill="#111827" font-family="sans-serif">送信者公開鍵で検証</text>

  <text x="70" y="670" font-size="38" fill="#dc2626" font-family="sans-serif">公開鍵で検証できるなら、改ざん・なりすましの検知に有効</text>
